name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Smart-contract build + tests
  # ──────────────────────────────────────────────
  contracts:
    name: Smart Contracts (Rust / Soroban)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smart-contracts/soroban-contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Pinned to 1.95.0: newer stable fails to compile ethnum 1.5.2 (E0512).
      - name: Install Rust 1.95.0 toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            smart-contracts/soroban-contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('smart-contracts/soroban-contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features

      - name: Run contract unit tests
        run: cargo test

      - name: Build WASM artifacts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasms
          path: smart-contracts/soroban-contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 2: Frontend install + test + build (Create React App)
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend (React 18 / CRA)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

      - name: Build production bundle
        run: npm run build
        env:
          CI: false
          REACT_APP_API_URL: https://fino-6e10.onrender.com/api
          REACT_APP_STELLAR_EXPLORER_URL: https://stellar.expert/explorer/testnet
          REACT_APP_GOVERNANCE_ADDRESS: ${{ secrets.REACT_APP_GOVERNANCE_ADDRESS }}
          REACT_APP_ADMIN_WALLET: ${{ secrets.REACT_APP_ADMIN_WALLET }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 3
